<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
      const link = document.createElement("link")
      link.rel = "stylesheet"
      link.href = `src/easy-tooltips.css?rnd=${Math.random()}`
      document.head.append(link)
    </script>
  </head>
  <body>
    <div style="display: flex; justify-content: space-between; flex-direction: column; height: 200vh;">
      <div style="display: flex; justify-content: space-between;">
        <a href="https://google.com" target="_blank" data-easy-tooltip="I am a tooltip I am a tooltip" style="background: red;">Hello there</a>
        <div tabindex="0" data-easy-tooltip="I am a tooltip I am a tooltip<br>I am a tooltip I am a tooltip" style="background: red;">Hello there</div>
      </div>
      <div style="display: flex; justify-content: space-between;">
        <div tabindex="0" data-easy-tooltip-class="big-tooltip" data-easy-tooltip="I am a tooltip I am a tooltip I am a tooltip I am a tooltip I am a tooltip I am a tooltip I am a tooltip I am a tooltip I am a tooltip I am a tooltip I am a tooltip I am a tooltip I am a tooltip I am a tooltip I am a tooltip I am a tooltip I am a tooltip I am a tooltip I am a tooltip I am a tooltip I am a tooltip I am a tooltip I am a tooltip I am a tooltip I am a tooltip I am a tooltip I am a tooltip I am a tooltip I am a tooltip I am a tooltip I am a tooltip I am a tooltip I am a tooltip I am a tooltip I am a tooltip I am a tooltip I am a tooltip I am a tooltip I am a tooltip I am a tooltip I am a tooltip I am a tooltip I am a tooltip I am a tooltip I am a tooltip I am a tooltip I am a tooltip I am a tooltip I am a tooltip I am a tooltip I am a tooltip I am a tooltip I am a tooltip I am a tooltip I am a tooltip I am a tooltip I am a tooltip I am a tooltip I am a tooltip I am a tooltip I am a tooltip I am a tooltip I am a tooltip I am a tooltip I am a tooltip I am a tooltip I am a tooltip I am a tooltip I am a tooltip I am a tooltip I am a tooltip I am a tooltip I am a tooltip I am a tooltip I am a tooltip I am a tooltip I am a tooltip I am a tooltip I am a tooltip I am a tooltip I am a tooltip I am a tooltip I am a tooltip I am a tooltip" style="background: red;">Hello there</div>
        <div tabindex="0" data-easy-tooltip-src="next" style="background: red;">Hello there</div>
        <div>I am a tooltip I am a tooltip<br>I have <b>BOLD</b> text</div>
      </div>
    </div>
    <div style="position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);">
      <div tabindex="0" data-easy-tooltip="I am a tooltip I am a tooltip" style="background: red; padding: 20px;">
        Hello there<br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br>
        <div tabindex="0" data-easy-tooltip="I am a sub-tooltip&#10;I am a sub-tooltip" data-easy-tooltip-class="sub-tooltip" style="background: lime;">Hello there</div>
      </div>
    </div>
    <div style="position: absolute; left: 50%; top: 50%; transform: translate(-50%, 120px); display: flex; gap: 40px;">
      <div tabindex="0" data-easy-tooltip="I prefer above (default)" style="background: cyan; padding: 10px;">prefer: above</div>
      <div tabindex="0" data-easy-tooltip="I prefer below" data-easy-tooltip-prefer="below" style="background: cyan; padding: 10px;">prefer: below</div>
      <div tabindex="0" data-easy-tooltip="I prefer left and I have a really really really really really really really really really really really really really really really really really really really really long piece of text to test the max width clamping on the left side" data-easy-tooltip-prefer="left" style="background: cyan; padding: 10px;">prefer: left</div>
      <div tabindex="0" data-easy-tooltip="I prefer right and I have a really really really really really really really really really really really really really really really really really really really really long piece of text to test the max width clamping on the right side" data-easy-tooltip-prefer="right" style="background: cyan; padding: 10px;">prefer: right</div>
    </div>
    <div style="position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);">
      <div tabindex="0" id="changing-tooltip" data-easy-tooltip="Count: 0" style="background: orange; padding: 10px;">Changing tooltip</div>
    </div>
    <div style="position: fixed; bottom: 20px; left: 20px;">
      <div tabindex="0" id="auto-release" data-easy-tooltip="Hover me, I delete myself in 5s" style="background: violet; padding: 10px;">Auto release</div>
    </div>
    <script>
      let count = 0
      setInterval(() => {
        document.getElementById("changing-tooltip").dataset.easyTooltip = `Count: ${++count}`
      }, 1000)

      let autoReleaseTimer
      document.getElementById("auto-release").addEventListener("mouseover", function () {
        if (autoReleaseTimer) return
        autoReleaseTimer = setTimeout(() => this.remove(), 5000)
      })
    </script>
    <script>import(`./src/easy-tooltips.js?rnd=${Math.random()}`)</script>
  </body>
</html>
